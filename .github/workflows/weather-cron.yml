name: weather-cron

# Vercel Hobby는 크론이 하루 1회만 허용되므로, apps/weather 수집 크론은 GitHub Actions에서 트리거한다.
# 스케줄은 기상청 단기예보 발표시각(KST 02/05/08/11/14/17/20/23) + 10분 버퍼,
# 중기예보 발표시각(KST 06/18) + 10분 버퍼 기준이다. UTC로 환산:
#   - 단기: 17:10, 20:10, 23:10, 02:10, 05:10, 08:10, 11:10, 14:10 UTC
#   - 중기: 21:10, 09:10 UTC
#
# 단기/중기 ingest는 Vercel 함수 상한(약 5분)을 넘지 않도록 shard/total로 분할 호출한다.
# 격자가 더 늘면 Ingest short-term step에 env: SHORT_SHARDS: "16" 처럼 늘린다.

on:
  schedule:
    # 단기예보 ingest (8회/일)
    - cron: "10 17 * * *"
    - cron: "10 20 * * *"
    - cron: "10 23 * * *"
    - cron: "10 2 * * *"
    - cron: "10 5 * * *"
    - cron: "10 8 * * *"
    - cron: "10 11 * * *"
    - cron: "10 14 * * *"
    # 중기예보 ingest (2회/일)
    - cron: "10 21 * * *"
    - cron: "10 9 * * *"
  workflow_dispatch:
    inputs:
      kind:
        description: "수동 실행 대상 ('short' | 'mid' | 'both')"
        default: "both"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 단기: 샤드 N회 순차 호출(합쳐서) — tracked_grids 증가 시 단일 Vercel 함수가 5분 제한(504)에 걸릴 수 있음
    timeout-minutes: 30
    environment: Production
    steps:
      - name: Decide which endpoints to call
        id: decide
        run: |
          schedule="${{ github.event.schedule }}"
          manual="${{ github.event.inputs.kind }}"
          call_short=false
          call_mid=false
          case "$schedule" in
            "10 21 * * *"|"10 9 * * *")
              call_mid=true
              ;;
            "10 17 * * *"|"10 20 * * *"|"10 23 * * *"|"10 2 * * *"|"10 5 * * *"|"10 8 * * *"|"10 11 * * *"|"10 14 * * *")
              call_short=true
              ;;
          esac
          if [ "$manual" = "short" ]; then call_short=true; fi
          if [ "$manual" = "mid" ]; then call_mid=true; fi
          if [ "$manual" = "both" ]; then call_short=true; call_mid=true; fi
          echo "call_short=$call_short" >> "$GITHUB_OUTPUT"
          echo "call_mid=$call_mid" >> "$GITHUB_OUTPUT"

      - name: Ingest short-term
        if: steps.decide.outputs.call_short == 'true'
        env:
          WEATHER_BASE_URL: ${{ secrets.WEATHER_BASE_URL }}
          CRON_SECRET: ${{ secrets.WEATHER_CRON_SECRET }}
        run: |
          set -euo pipefail
          TOTAL="${SHORT_SHARDS:-8}"
          for s in $(seq 0 $((TOTAL - 1))); do
            code=$(curl -sS -o /tmp/short.json -w "%{http_code}" \
              --max-time 600 \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$WEATHER_BASE_URL/api/cron/ingest-short-term?shard=$s&total=$TOTAL")
            echo "short-term shard $s/$TOTAL HTTP $code"
            cat /tmp/short.json || true
            [ "$code" = "200" ] || exit 1
          done

      - name: Ingest mid-term
        if: steps.decide.outputs.call_mid == 'true'
        env:
          WEATHER_BASE_URL: ${{ secrets.WEATHER_BASE_URL }}
          CRON_SECRET: ${{ secrets.WEATHER_CRON_SECRET }}
        run: |
          set -euo pipefail
          TOTAL="${MID_SHARDS:-4}"
          for s in $(seq 0 $((TOTAL - 1))); do
            code=$(curl -sS -o /tmp/mid.json -w "%{http_code}" \
              --max-time 600 \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$WEATHER_BASE_URL/api/cron/ingest-mid-term?shard=$s&total=$TOTAL")
            echo "mid-term shard $s/$TOTAL HTTP $code"
            cat /tmp/mid.json || true
            [ "$code" = "200" ] || exit 1
          done
